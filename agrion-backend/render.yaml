services:
  - type: web
    name: agrion-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: FEATHERLESS_MODEL
        value: meta-llama/Meta-Llama-3.1-8B-Instruct
      - key: PHONE_HASH_SALT
        generateValue: true
      - key: PORT
        value: "10000"
